<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무저크루 응원가</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111, #333);
      color: white;
      text-align: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #ccc;
      margin-bottom: 40px;
    }

    .song-card {
      background: white;
      color: #111;
      max-width: 650px;
      margin: 20px auto;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 0 20px rgba(255,255,255,0.12);
    }

    .song-card h2 {
      margin-top: 0;
      font-size: 28px;
    }

    audio {
      width: 100%;
      margin-top: 15px;
    }

    button {
      margin-top: 30px;
      padding: 14px 24px;
      font-size: 17px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background-color: #ffcc00;
      color: #111;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <h1>무저크루 응원가</h1>
  <p class="subtitle">무저크루 공식 응원가 모음</p>

  <div class="song-card">
    <h2>응원가 1: 염병따라 무저따리</h2>
    <audio controls>
      <source src="hay-una-mujer-corto.mp3" type="audio/mpeg">
      이 브라우저는 오디오 재생을 지원하지 않습니다.
    </audio>
  </div>

  <div class="song-card">
    <h2>응원가 2: 섬진강 챔피언</h2>
    <audio controls>
      <source src="2010 1 (1) (1).mp3" type="audio/mpeg">
      이 브라우저는 오디오 재생을 지원하지 않습니다.
    </audio>
  </div>

  <div class="song-card">
    <h2>응원가 3: 알레 무저</h2>
    <audio controls>
      <source src="2010 하이랜드 응원가 (1).mp3" type="audio/mpeg">
      이 브라우저는 오디오 재생을 지원하지 않습니다.
    </audio>
  </div>

  <button onclick="location.href='index.html'">메인으로 돌아가기</button>

</body>
</html>
